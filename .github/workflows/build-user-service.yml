name: Build user-service image

on:
  pull_request:
    paths:
      - "user-service/**"

  push:
    branches:
      - main
    paths:
      - "user-service/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build with Maven
        working-directory: user-service
        run: mvn -q clean package -DskipTests --no-transfer-progress

      - name: Generate Tag
        if: github.event_name == 'push'
        id: tag
        run: |
          DATE=$(date +'%Y-%m-%d')
          SHA=$(git rev-parse --short HEAD)
          echo "tag=main-${DATE}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Login Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Build and Push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ steps.tag.outputs.tag }}

      - name: Show Image Tag
        if: github.event_name == 'push'
        run: echo "Published image tag = ${{ steps.tag.outputs.tag }}"