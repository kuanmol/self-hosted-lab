name: Build user-service image

on:
  push:
    branches:
      - main
    paths:
      - 'user-service/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Tag
        id: tag
        run: |
          DATE=$(date +'%Y%m%d')
          TIME=$(date +'%H%M')
          SHA=$(git rev-parse --short HEAD)

          TAG="main-${DATE}-${TIME}-${SHA}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./user-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ steps.tag.outputs.tag }}

      - name: Show Image Tag
        run: echo "Published tag ${{ steps.tag.outputs.tag }}"